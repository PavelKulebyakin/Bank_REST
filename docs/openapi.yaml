openapi: 3.1.0
info:
  title: OpenAPI definition
  version: v0
servers:
  - url: http://localhost:8080/api
    description: Generated server url
paths:
  /admin/user/{id}:
    get:
      tags:
        - admin-user-controller
      operationId: getUserById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/UserInfoResponseDTO"
    put:
      tags:
        - admin-user-controller
      operationId: updateUserById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdateDTO"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/UserInfoResponseDTO"
    delete:
      tags:
        - admin-user-controller
      operationId: deleteUserById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "200":
          description: OK
  /admin/cards/{id}:
    get:
      tags:
        - admin-card-controller
      operationId: getCardById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CardInfoResponseDTO"
    put:
      tags:
        - admin-card-controller
      operationId: updateCardStatusById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CardStatusUpdateDTO"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CardInfoResponseDTO"
    delete:
      tags:
        - admin-card-controller
      operationId: deleteCardById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "200":
          description: OK
  /me/transfer:
    post:
      tags:
        - transfer-controller
      operationId: transferBetweenCards
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransferDTO"
        required: true
      responses:
        "200":
          description: OK
  /me/cards/{cardId}/block:
    post:
      tags:
        - user-card-controller
      operationId: blockCard
      parameters:
        - name: cardId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
  /auth/login:
    post:
      tags:
        - auth-controller
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRequestDTO"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /admin/user:
    get:
      tags:
        - admin-user-controller
      operationId: getAllUsersWithRoleAndPagination
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 1
            minimum: 1
        - name: size
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 10
            minimum: 1
        - name: role
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserInfoResponseDTO"
    post:
      tags:
        - admin-user-controller
      operationId: createUser
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserCreateDTO"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/UserInfoResponseDTO"
  /admin/cards:
    get:
      tags:
        - admin-card-controller
      operationId: getCardsWithStatusAndPaging
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 1
            minimum: 1
        - name: size
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 10
            minimum: 1
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CardInfoResponseDTO"
    post:
      tags:
        - admin-card-controller
      operationId: addNewCard
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CardCreateDTO"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CardInfoResponseDTO"
  /me/cards:
    get:
      tags:
        - user-card-controller
      operationId: getUserCardsByStatusWithPagination
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: page
          in: query
          required: true
          schema:
            type: integer
            format: int32
            minimum: 1
        - name: size
          in: query
          required: true
          schema:
            type: integer
            format: int32
            minimum: 1
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CardInfoResponseDTO"
  /me/cards/{cardId}:
    get:
      tags:
        - user-card-controller
      operationId: getUserCardsById
      parameters:
        - name: cardId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CardInfoResponseDTO"
  /me/cards/{cardId}/balance:
    get:
      tags:
        - user-card-controller
      operationId: getCardBalance
      parameters:
        - name: cardId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CardBalanceResponseDTO"
  /me/cards/pan:
    get:
      tags:
        - user-card-controller
      operationId: getUserCardsByPan
      parameters:
        - name: last_4
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CardInfoResponseDTO"
  /me/cards/all:
    get:
      tags:
        - user-card-controller
      operationId: getUserCards
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CardInfoResponseDTO"
  /admin/user/all:
    get:
      tags:
        - admin-user-controller
      operationId: getAllUsers
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserInfoResponseDTO"
  /admin/cards/all:
    get:
      tags:
        - admin-card-controller
      operationId: getAllCards
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CardInfoResponseDTO"
components:
  schemas:
    UserUpdateDTO:
      type: object
      properties:
        fullName:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
        role:
          type: string
    UserInfoResponseDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        fullName:
          type: string
        email:
          type: string
        role:
          type: string
    CardStatusUpdateDTO:
      type: object
      properties:
        status:
          type: string
          minLength: 1
      required:
        - status
    CardInfoResponseDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        last4Digits:
          type: string
        cardholderName:
          type: string
        expirationDate:
          type: string
        status:
          type: string
    TransferDTO:
      type: object
      properties:
        fromId:
          type: integer
          format: int64
        toId:
          type: integer
          format: int64
        amount:
          type: number
          minimum: 0.01
      required:
        - amount
        - fromId
        - toId
    AuthRequestDTO:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1
      required:
        - email
        - password
    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
    UserCreateDTO:
      type: object
      properties:
        fullName:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1
        role:
          type: string
      required:
        - email
        - fullName
        - password
    CardCreateDTO:
      type: object
      properties:
        userId:
          type: integer
          format: int64
        cardholderName:
          type: string
          minLength: 1
        validityPeriod:
          type: integer
          format: int32
          minimum: 1
      required:
        - cardholderName
        - userId
    CardBalanceResponseDTO:
      type: object
      properties:
        cardId:
          type: integer
          format: int64
        balance:
          type: number
